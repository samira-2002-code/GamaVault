<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GameVault - Catalogue</title>
    <link href="https://unpkg.com/tailwindcss@^2/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-purple-400 min-h-screen text-white font-sans">

    <header class="p-6">
        <div class="flex justify-between items-center max-w-6xl mx-auto">
            <div>
                <h1 class="text-3xl font-bold">GameVault</h1>
                <p class="text-sm">Jeux vidéo dématérialisés - Catalogue & Panier</p>
            </div>
            <a href="cart.html" class="relative p-2">
                <img class="w-8 h-8 " src="image.png" alt="panier">
                
            </a>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-12">
        <div class="mt-4">
            <input type="text" id="search-input" placeholder="rechercher par titre...." 
                   class="w-full p-3 rounded-lg bg-blue-100 text-gray-800  ">
        </div>

<div class="flex gap-2 mt-6 justify-center overflow-x-auto whitespace-nowrap">
    <button class="category-btn bg-blue-900 px-6 py-2 rounded-lg font-semibold" data-category="Tous">Tous</button>
    
</div>
        <h2 class="text-2xl font-bold mt-10 mb-6">Catalogue de jeux</h2>

        <div id="games-container" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
            </div>
    </main>

    <script type="module" src="main.js"></script>
</body>
</html>
